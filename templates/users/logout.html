{% extends 'base.html' %}

{% block title %}Logout – JobConnect{% endblock %}

{% block content %}
<div class="confirm-box">
    <i class="fas fa-sign-out-alt" style="font-size:3rem; color: var(--primary); margin-bottom:1rem;"></i>
    <h2>Sign Out</h2>
    <p>Are you sure you want to sign out of your account?</p>
    <form method="POST">
        {% csrf_token %}
        <div class="btn-group" style="justify-content: center;">
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-sign-out-alt"></i> Yes, Sign Out
            </button>
            <a href="{% url 'home' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
