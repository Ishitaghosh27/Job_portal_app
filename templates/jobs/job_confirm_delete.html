{% extends 'base.html' %}

{% block title %}Delete Job – JobConnect{% endblock %}

{% block content %}
<div class="confirm-box">
    <i class="fas fa-exclamation-triangle"></i>
    <h2>Delete Job</h2>
    <p>Are you sure you want to delete <strong>"{{ job.title }}"</strong>? This action cannot be undone and all
        associated applications will also be removed.</p>
    <form method="POST">
        {% csrf_token %}
        <div class="btn-group justify-center">
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-trash"></i> Yes, Delete
            </button>
            <a href="{% url 'job_detail' job.pk %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
